spring.application.name=auth
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
security.password.min-length=8
security.password.max-length=64
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digit=true
security.password.require-special=true
auth.password.length=Password does not meet length requirements
auth.password.uppercase=Password must contain at least one uppercase letter
auth.password.lowercase=Password must contain at least one lowercase letter
auth.password.digit=Password must contain at least one digit
auth.password.special=Password must contain at least one special character